services:
  postgres:
    image: postgres:16-alpine
    container_name: novelty-precheck-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: novelty
      POSTGRES_PASSWORD: novelty_dev
      POSTGRES_DB: novelty_precheck
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novelty -d novelty_precheck"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres-data:
