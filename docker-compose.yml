services:
  postgres:
    image: postgres:16-alpine
    container_name: novelty-precheck-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-novelty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novelty_dev}
      POSTGRES_DB: ${POSTGRES_DB:-novelty_precheck}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novelty} -d ${POSTGRES_DB:-novelty_precheck}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
